name: CI

on:
  push:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Show Rust toolchain
        run: rustc --version && cargo --version

      - name: Run tests
        run: cargo test --locked
